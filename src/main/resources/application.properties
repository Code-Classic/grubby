# Repo cloning and analysis defaults
repo.workdir.root=D:/repos
analysis.maxFiles=400
analysis.maxBytesPerFile=131072
# Analysis engine: javaparser|heuristic
analysis.engine=javaparser

# Local storage root for generated documents
storage.local.root=./storage

# Retry defaults (M3)
retry.clone.attempts=3
retry.clone.initialDelayMillis=1000
retry.clone.backoff=2.0
retry.llm.attempts=3
retry.llm.initialDelayMillis=2000
retry.llm.backoff=1.8

# Cache TTLs (in milliseconds)
# 48h
cache.analysis.ttlMillis=172800000
# 12h
cache.brd.ttlMillis=43200000
# 10m
cache.cleanup.intervalMillis=600000

# LLM HTTP timeout (seconds)
llm.http.timeout.seconds=60

# Workdir cleanup (M2.5)
workdir.cleanup.enabled=true
workdir.cleanup.retention=P3D
workdir.cleanup.cron=0 0 * * * *
workdir.deleteOnSuccess=false
